style:
  # ========== 基础设置 ==========
  auto_caps: false
  background_dim_amount: 0.3
  
  # ========== 候选窗设置（哈吉文优化） ==========
  candidate_font: "./fonts/HaJi.ttf"  # 使用哈吉文字体显示候选
  candidate_padding: 8
  candidate_spacing: 1.0
  candidate_text_size: 26  # 增大候选字大小
  candidate_use_cursor: true
  candidate_view_height: 35  # 增高候选窗
  candidate_min_width: 48  # 最小候选宽度
  
  # ========== 注释设置 ==========
  comment_font: comment.ttf
  comment_height: 14
  comment_on_top: false  # 注释在下方
  comment_text_size: 14
  
  # ========== Enter键标签 ==========
  enter_label_mode: 1  # 根据输入状态动态显示
  enter_labels:
    default: Enter
    done: "完成"
    go: "前往"
    next: "下个"
    pre: "上个"
    search: "搜索"
    send: "发送"
    
  # ========== 字体设置（核心） ==========
  font_face: "./fonts/HaJi.ttf"  # 主字体：哈吉文
  hanb_font: hanb.ttf
  key_font: "./fonts/HaJi.ttf"  # 按键字体：哈吉文
  label_font: label.ttf
  latin_font: "./fonts/HaJi.ttf"  # 拉丁字体：哈吉文
  long_text_font: "./fonts/HaJi.ttf"  # 长按文本：哈吉文
  preview_font: "./fonts/HaJi.ttf"  # 预览字体：哈吉文
  symbol_font: symbol.ttf
  text_font: "./fonts/HaJi.ttf"  # 文本字体：哈吉文
  
  # ========== 键盘布局设置 ==========
  horizontal: true
  horizontal_gap: 2  # 增大水平间距
  keyboard_height: 280  # 增高键盘
  keyboard_height_land: 220
  keyboard_padding: 2
  keyboard_padding_bottom: 2
  keyboard_padding_land: 20
  keyboard_padding_land_bottom: 2
  keyboard_padding_left: 2
  keyboard_padding_right: 2
  
  # ========== 按键设置 ==========
  key_height: 48  # 增高按键
  key_long_text_border: 2
  key_long_text_size: 16
  key_text_size: 24  # 增大按键文字
  key_width: 10.0
  key_press_offset_x: 2  # 按键按下偏移
  key_press_offset_y: 2
  key_hint_offset_x: 0  # 提示文字偏移
  key_hint_offset_y: -30
  
  # ========== 布局设置 ==========
  layout:
    alpha: 0xdd
    border: 2
    elevation: 8  # 增大阴影
    line_spacing: 2  # 增大行间距
    line_spacing_multiplier: 1.3
    margin_x: 8  # 增大边距
    margin_y: 8
    max_height: 500
    max_width: 250
    min_height: 0
    min_width: 50
    round_corner: 12  # 增大圆角
    spacing: 3  # 增大按键间距
    
  # ========== 本地化 ==========
  locale: zh_CN  # 改为简体中文
  latin_locale: zh_CN
  
  # ========== 预览设置 ==========
  preview_height: 80  # 增高预览窗
  preview_offset: "-15"
  preview_text_size: 48  # 增大预览文字
  preview_border: 2
  preview_round_corner: 8
  
  # ========== 其他设置 ==========
  proximity_correction: true
  reset_ascii_mode: false
  round_corner: 12  # 统一圆角
  shadow_radius: 2.0  # 阴影半径
  speech_opencc_config: s2t.json
  
  # ========== 文本设置 ==========
  symbol_text_size: 12
  text_size: 18
  
  # ========== 垂直调整 ==========
  vertical_correction: "-5"
  vertical_gap: 2
  
  # ========== 配色方案 ==========
  color_scheme: haji_dark  # 使用哈吉文专用配色
  
  # ========== 启用的键盘布局 ==========
  keyboards:
    - haji_optimized  # 哈吉文优化布局
    - haji_compact     # 哈吉文紧凑布局
    - letter           # 字母键盘
    - number           # 数字键盘
    - symbols          # 符号键盘
    - mini             # 迷你键盘
  
  __include: HaJi.custom:/patch
