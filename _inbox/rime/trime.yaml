preset_keyboards:
  haji_optimized:
    ascii_mode: 0
    author: 抹抹
    height: 48
    name: "哈吉文·优化版"
    width: 10
    columns: 10
    key_text_size: 20
    key_hint_offset_x: 0
    key_hint_offset_y: -28
    key_press_offset_x: 1
    key_press_offset_y: 1
    keys: [
      # 第一排：QWERTY + 数字快速访问
      {click: q, label: "q", long_click: 1, hint: "1", swipe_up: 1},
      {click: w, label: "w", long_click: 2, hint: "2", swipe_up: 2},
      {click: e, label: "e", long_click: 3, hint: "3", swipe_up: 3},
      {click: r, label: "r", long_click: 4, hint: "4", swipe_up: 4},
      {click: t, label: "t", long_click: 5, hint: "5", swipe_up: 5},
      {click: y, label: "y", long_click: 6, hint: "6", swipe_up: 6},
      {click: u, label: "u", long_click: 7, hint: "7", swipe_up: 7},
      {click: i, label: "i", long_click: 8, hint: "8", swipe_up: 8},
      {click: o, label: "o", long_click: 9, hint: "9", swipe_up: 9},
      {click: p, label: "p", long_click: 0, hint: "0", swipe_up: 0},
      
      # 第二排：Home行 + 常用符号
      {click: a, label: "a", long_click: "-", hint: "-", swipe_down: "_"},
      {click: s, label: "s", long_click: "=", hint: "=", swipe_down: "+"},
      {click: d, label: "d", long_click: "[", hint: "[", swipe_down: "{"},
      {click: f, label: "f", long_click: "]", hint: "]", swipe_down: "}"},
      {click: g, label: "g", long_click: "(", hint: "(", swipe_down: "<"},
      {click: h, label: "h", long_click: ")", hint: ")", swipe_down: ">"},
      {click: j, label: "j", long_click: ";", hint: ";", swipe_down: ":"},
      {click: k, label: "k", long_click: "'", hint: "'", swipe_down: "\""},
      {click: l, label: "l", long_click: ",", hint: ",", swipe_down: "."},
      {click: BackSpace, label: "⌫", long_click: Escape, width: 10, repeatable: true},
      
      # 第三排：底部行 + 功能键
      {click: Shift_L, label: "⇧", width: 12, send_bindings: false},
      {click: z, label: "z", long_click: "!", hint: "!"},
      {click: x, label: "x", long_click: "@", hint: "@"},
      {click: c, label: "c", long_click: "#", hint: "#"},
      {click: v, label: "v", long_click: "$", hint: "$"},
      {click: b, label: "b", long_click: "%", hint: "%"},
      {click: n, label: "n", long_click: "^", hint: "^"},
      {click: m, label: "m", long_click: "&", hint: "&"},
      {click: ",", label: "，", long_click: "?", hint: "?"},
      {click: ., label: "。", long_click: "/", hint: "/"},
      {click: Return, label: "确定", width: 12, composing: Return1, long_click: CommitComment},
      
      # 第四排：功能栏
      {click: Keyboard_symbols, label: "123", long_click: Keyboard_number, width: 10},
      {click: Mode_switch, label: "中/英", long_click: Menu, width: 10},
      {click: space, label: "空格", width: 45},
      {click: liquid_keyboard_switch, label: "更多", long_click: liquid_keyboard_clipboard, width: 10},
      {click: "'", label: "'", long_click: "\"", width: 10}
    ]
    
  haji_compact:
    ascii_mode: 0
    author: 抹抹
    height: 50
    name: "哈吉文·紧凑版"
    width: 10
    columns: 10
    key_text_size: 18
    key_height: 42
    keys: [
      # 优化：更大的按键，更少的行数
      {click: q, label: "Q", long_click: 1},
      {click: w, label: "W", long_click: 2},
      {click: e, label: "E", long_click: 3},
      {click: r, label: "R", long_click: 4},
      {click: t, label: "T", long_click: 5},
      {click: y, label: "Y", long_click: 6},
      {click: u, label: "U", long_click: 7},
      {click: i, label: "I", long_click: 8},
      {click: o, label: "O", long_click: 9},
      {click: p, label: "P", long_click: 0},
      
      {click: a, label: "A", long_click: "@"},
      {click: s, label: "S", long_click: "#"},
      {click: d, label: "D", long_click: "$"},
      {click: f, label: "F", long_click: "%"},
      {click: g, label: "G", long_click: "&"},
      {click: h, label: "H", long_click: "*"},
      {click: j, label: "J", long_click: "-" },
      {click: k, label: "K", long_click: "+"},
      {click: l, label: "L", long_click: "="},
      {click: BackSpace, label: "⌫", width: 10, repeatable: true},
      
      {click: Shift_L, width: 13},
      {click: z, label: "Z"},
      {click: x, label: "X"},
      {click: c, label: "C"},
      {click: v, label: "V"},
      {click: b, label: "B"},
      {click: n, label: "N"},
      {click: m, label: "M"},
      {click: ",", label: "，"},
      {click: ., label: "。"},
      {click: Return, width: 13, composing: Return1},
      
      {click: Keyboard_symbols, width: 10},
      {click: Mode_switch, width: 10},
      {click: space, width: 50},
      {click: liquid_keyboard_switch, width: 10},
      {click: "'", width: 10}
    ]
